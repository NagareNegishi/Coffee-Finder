# Weekly Coffee Shop Cleanup & Supabase Pause Prevention
# This workflow deletes stale coffee shop records from the database
# and keeps the Supabase free tier project alive by acting as a DB ping.
#
# References:
#   - Workflow syntax:        https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions
#   - Schedule trigger:       https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
#   - Encrypted secrets:      https://docs.github.com/en/actions/security-for-github-actions/security-guides/using-secrets-in-github-actions
#   - setup-node action:      https://github.com/actions/setup-node
#   - Supabase JS client:     https://supabase.com/docs/reference/javascript/introduction
#   - Supabase delete query:  https://supabase.com/docs/reference/javascript/delete
#   - Supabase RLS & keys:    https://supabase.com/docs/guides/database/postgres/row-level-security

# ── Trigger ──────────────────────────────────────────────────────────
# "on" defines when this workflow runs.
# Ref: https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows
name: Weekly Coffee Shop Cleanup

on:
  # "schedule" uses POSIX cron syntax in UTC time.
  # Scheduled workflows only run on the default branch (main).
  # Ref: https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
  schedule:
    - cron: '30 9 * * 1'  # Every Monday at 9:30 AM UTC (avoid top of hour — GitHub warns of delays at :00)

  # "workflow_dispatch" lets you trigger this manually from the Actions tab.
  # Useful for testing without waiting for the schedule.
  # Ref: https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#workflow_dispatch
  workflow_dispatch:

# ── Jobs ─────────────────────────────────────────────────────────────
# A job is a set of steps that run on the same runner.
# Ref: https://docs.github.com/en/actions/using-jobs/using-jobs-in-a-workflow
jobs:
  cleanup:
    # "runs-on" specifies the runner environment.
    # Ref: https://docs.github.com/en/actions/using-github-hosted-runners/using-github-hosted-runners/about-github-hosted-runners
    runs-on: ubuntu-latest

    steps:
      # Step 1: Set up Node.js so we can use npm and run JS.
      # Ref: https://github.com/actions/setup-node
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 2: Install the Supabase JS client library.
      # Ref: https://supabase.com/docs/reference/javascript/introduction
      - name: Install Supabase Client
        run: npm install @supabase/supabase-js

      # Step 3: Run the cleanup query.
      # "env" injects GitHub secrets as environment variables — they are never printed in logs.
      # Ref (secrets): https://docs.github.com/en/actions/security-for-github-actions/security-guides/using-secrets-in-github-actions
      # Ref (delete):  https://supabase.com/docs/reference/javascript/delete
      # Ref (lt filter): https://supabase.com/docs/reference/javascript/using-filters#less-than
      #
      # Uses the service role key to bypass RLS, since the coffee_shops table
      # only has SELECT and INSERT policies for anon — no DELETE policy.
      # Ref (RLS): https://supabase.com/docs/guides/database/postgres/row-level-security
      - name: Delete stale coffee shops
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node -e "
          const { createClient } = require('@supabase/supabase-js');
          const supabase = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_KEY);

          const MAX_DAYS = 30;
          const MS_PER_DAY = 24 * 60 * 60 * 1000;
          const cutoffDate = new Date(Date.now() - MAX_DAYS * MS_PER_DAY).toISOString();

          (async () => {
            try {
              const { data, error } = await supabase
                .from('coffee_shops')
                .delete()
                .lt('updated_at', cutoffDate)
                .select('osm_id');

              if (error) {
                console.error('Cleanup failed:', error.message);
                process.exit(1);
              }

              const count = data ? data.length : 0;
              console.log('Cutoff date: ' + cutoffDate);
              console.log('Deleted ' + count + ' coffee shops older than ' + MAX_DAYS + ' days');
            } catch (err) {
              console.error('Unexpected error:', err.message);
              process.exit(1);
            }
          })();
          "